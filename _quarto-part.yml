## base for partial PDF builds
## copy to _quarto.yml,
## select desired chapters in _quarto-chap.yml,
## and run: quarto render --to pdf --profile chap

project:
  type: book
  output-dir: manuscript

fig-width: 7
fig-height: 5
fig-align: "center"
fig-dpi: 300

# code execution default settings
execute:
  echo: false       # do not include code (folded by default, see above)
  results: 'hide'   # hide all output except plots and explicitly printed
  message: false    # hide messages from library loading, other functions
  warning: true     # show warnings
  # include: not used, controls inclusion of both code and output (T/F);
  # combination of echo and results settings

format:
  html:
    theme: simplex
    fontsize: 1.2em
    linestretch: 1.35
    mainfont: Helvetica Neue, Helvetica, Arial, sans
    monofont: Cascadia Mono, Menlo, Consolas, Courier New, Courier
    backgroundcolor: "white"
    fontcolor: "black"
    knitr:
      opts_chunk:
        dev: "ragg_png"
  # fenced code blocks
    highlight-style: dracula
    code-line-numbers: true
    code-fold: true
  # custom css
    css: "css/custom.css"
    
  pdf:
  ### PDF reference: https://quarto.org/docs/reference/formats/pdf.html
  # Title & Author - see book options
  # Format Options
    ## results in build error, missing packages:
    # pdf-engine-opt: -output-directory=work
    output-file: "dissertation"
    output-ext: "pdf"
  # Table of Contents
    toc: false
    lof: false
    lot: false
  # Numbering
    number-sections: true
    number-depth: 2
  # Fonts
    # main: body, sans: headings, mono: codeblocks
    mainfont: Georgia
    sansfont: Verdana
    monofont: Source Code Pro
    fontsize: 11pt
    # so that draft overfill indicators match final results:
    microtypeoptions: ["final"]
    ## stretches all lines, not just body paragraphs:
    linestretch: 1.35
  # Fenced code blocks
    highlight-style: arrow
  # Colors
    colorlinks: true
    urlcolor: "DarkOrange2"
    linkcolor: "DodgerBlue4"
    filecolor: "Turquoise3"
    citecolor: "DarkOliveGreen4"
  # Layout
    documentclass: scrbook
    classoption: 
      - oneside
      - open=any
      - numbers=noenddot
    geometry:
      - margin=1in
      - bindingoffset=0.5in
      - heightrounded
      - footskip=0.475in
#     - showframe
    # footer only, with centered page number
    pagestyle: plain
  # Executable code block options
    execute:
      warning: false  # hide warnings

  # Includes
    # include-before-body: removed from template, unused
    # include-in-header:
  # Metadata
  # Rendering
    # template: tex/template.tex
    # template-partials: 
    # keep-tex: true

