# Quarto project - AU dissertation template
# initially based on new Quarto Book project
# uses titlepages v1 academic-static templates
project:
  type: book

book:
  title: "My Dissertation"
  author: "My Name"
  date: today
  chapters:
    - index.qmd # unused, but error when removed:
                # ERROR: Book contents must include a home page (e.g. index.md)
    - 1-intro.qmd
    - 2-lit_review.qmd
    - 3-prob_statement.qmd
    - 4-methods.qmd
    - 5-results.qmd
    - 6-conclusions.qmd
    - 7-references.qmd
    - 8-appendices.qmd

bibliography: references.bib

format:
  pdf:
    documentclass: scrbook
    classoption: ["onepage", "openany"]
    template-partials:
      - "templates/before-body.tex"
      - "templates/_titlepage.tex" 
    include-in-header: 
      - "templates/in-header.tex"
    toc: true
    toc-depth: 3
    lof: true
    lot: true
    margin-top: 1in
    margin-left: 1in
    margin-right: 1in
    margin-bottom: 1in
    fontsize: 12pt
