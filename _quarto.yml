# Quarto project - AU dissertation template
# initially based on new Quarto Book project
project:
  type: book

book:
  title: "My Dissertation"
  author: "My Name"
  date: today
  chapters:
    - index.qmd # unused, but error when removed:
                # ERROR: Book contents must include a home page (e.g. index.md)
    - 1-intro.qmd
    - 2-lit_review.qmd
    - 3-prob_statement.qmd
    - 4-methods.qmd
    - 5-results.qmd
    - 6-conclusions.qmd
    - 7-references.qmd
    - 8-appendices.qmd

bibliography: references.bib

format:
  pdf:
    documentclass: scrbook
    classoption: ["onepage", "openany"]
    toc: true
    lof: true
    lot: true
